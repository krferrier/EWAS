# Input data
############################
mvals: "data/jhs_bmi_ewas_mvals.fst"
pheno: "data/jhs_bmi_ewas_pheno.csv"

# EWAS model parameters
############################
association_variable: "BMI"
stratified_ewas: "yes" # yes or no
stratify_variables: ["sex"] # If yes, list which variable(s) to stratify on

# Differentially Methylated Region (DMR) Analysis 
#################################################
dmr_analysis: "yes" # yes or no
min_pvalue: 1e-04 # P-value threshold for beginning a region
window_size: 200 # extend region if another p-value within this distance is found
region_filter: 0.05 # post-filter reported regions

# DMR annotation
##################
genome_build: "hg38" # genome build from USCS
annotation:
  method: local
  gene_table: refGene
  # Use "latest" during active development.
  # For a manuscript/reproducible release, set this to a fixed date like "2026-06-08".
  cache_tag: latest
  ucsc_database_base: "https://hgdownload.soe.ucsc.edu/goldenPath"
  ucsc_gbdb_base: "https://hgdownload.soe.ucsc.edu/gbdb"
  hgnc_complete_set_url: "https://storage.googleapis.com/public-download-files/hgnc/tsv/tsv/hgnc_complete_set.txt"

# Parallelization parameters
############################
chunk_size: 5000 # number of methylation sites per chunk 
processing_type: "cluster" # sequential, multisession, multicore, or cluster
workers: 4 # Number of workers per job

# Output parameters
############################
out_directory: "results_test/" # Include trailing '/'
out_type: ".csv.gz" # .csv or .csv.gz
